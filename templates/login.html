<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxe Capital | Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080c14;
  --surface: #0d1117;
  --surface2: #111827;
  --border: #1f2937;
  --border2: #374151;
  --blue: #3b82f6;
  --blue-dim: #1d4ed8;
  --cyan: #06b6d4;
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #475569;
  --error: #ef4444;
  --green: #10b981;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ── GRID BG ── */
.grid-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
}

.blob {
  position: fixed; border-radius: 50%; filter: blur(120px);
  opacity: 0.1; pointer-events: none; z-index: 0;
}
.blob-1 { width: 400px; height: 400px; background: #3b82f6; top: -80px; right: -80px; }
.blob-2 { width: 300px; height: 300px; background: #06b6d4; bottom: 80px; left: -80px; }

/* ── HEADER ── */
header {
  padding: 24px 40px; position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
}

.logo {
  font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700;
  background: linear-gradient(135deg, #fff 0%, var(--blue) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-decoration: none;
}

.back-link {
  font-size: 0.85rem; color: var(--text-2); text-decoration: none;
  display: flex; align-items: center; gap: 6px; transition: color 0.2s;
}
.back-link:hover { color: var(--blue); }

/* ── MAIN ── */
main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 20px; position: relative; z-index: 1;
}

.auth-wrapper {
  width: 100%; max-width: 440px;
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ── TOGGLE TABS ── */
.tabs {
  display: flex; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 4px; margin-bottom: 28px;
}

.tab {
  flex: 1; padding: 10px; border-radius: 8px; border: none;
  background: transparent; color: var(--text-2); font-family: 'Inter', sans-serif;
  font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
}

.tab.active {
  background: var(--blue); color: #fff;
  box-shadow: 0 4px 12px rgba(59,130,246,0.3);
}

/* ── CARD ── */
.auth-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 36px 32px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
}

/* ── ICON ── */
.card-icon {
  width: 56px; height: 56px; border-radius: 14px;
  background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; margin-bottom: 20px;
}

.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 6px;
}

.card-sub { font-size: 0.9rem; color: var(--text-2); margin-bottom: 28px; }

/* ── FORM ── */
.form-group { margin-bottom: 18px; }

label {
  display: block; font-size: 0.78rem; font-weight: 600;
  color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.input-wrap { position: relative; }

input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 10px;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 0.95rem; padding: 12px 16px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}

input::placeholder { color: var(--text-3); }

.toggle-pw {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-3); font-size: 1rem; transition: color 0.2s;
}
.toggle-pw:hover { color: var(--text-2); }

/* ── EXTRAS ── */
.form-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; margin-top: -4px;
}

.checkbox-wrap { display: flex; align-items: center; gap: 8px; }
.checkbox-wrap input { width: auto; }
.checkbox-wrap label {
  font-size: 0.85rem; color: var(--text-2);
  text-transform: none; letter-spacing: 0; font-weight: 400; margin-bottom: 0;
}

.forgot { font-size: 0.85rem; color: var(--blue); text-decoration: none; }
.forgot:hover { text-decoration: underline; }

/* ── SUBMIT BTN ── */
.btn-submit {
  width: 100%; background: var(--blue); color: #fff; border: none;
  border-radius: 10px; padding: 14px; cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600;
  transition: all 0.2s; letter-spacing: 0.3px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-submit:hover { background: var(--blue-dim); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.3); }
.btn-submit:active { transform: translateY(0); }

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 12px; margin: 20px 0;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider span { font-size: 0.78rem; color: var(--text-3); }

/* ── SECURITY BADGES ── */
.security-row {
  display: flex; justify-content: center; gap: 20px; margin-top: 20px;
}
.badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75rem; color: var(--text-3); font-weight: 500;
}

/* ── FOOTER ── */
footer {
  text-align: center; padding: 20px;
  font-size: 0.78rem; color: var(--text-3);
  border-top: 1px solid var(--border);
  position: relative; z-index: 1;
}

/* ── PANEL VISIBILITY ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── MOBILE ── */
@media (max-width: 480px) {
  header { padding: 20px; }
  .auth-card { padding: 28px 20px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <a href="/" class="logo">Luxe Capital</a>
  <a href="/" class="back-link">← Back to Home</a>
</header>

<main>
  <div class="auth-wrapper">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div class="auth-card">

      <!-- LOGIN PANEL -->
      <div class="panel active" id="panel-login">
        <div class="card-icon">🏦</div>
        <div class="card-title">Welcome Back</div>
        <div class="card-sub">Sign in to access your loan dashboard</div>

        <form onsubmit="handleLogin(event);">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="name@example.com" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="login-pw" placeholder="••••••••"/>
              <button type="button" class="toggle-pw" onclick="togglePw('login-pw', this)">👁</button>
            </div>
          </div>
          <div class="form-row">
            <div class="checkbox-wrap">
              <input type="checkbox" id="remember"/>
              <label for="remember">Remember me</label>
            </div>
            <a href="#" class="forgot">Forgot Password?</a>
          </div>
          <button type="submit" class="btn-submit">Sign In →</button>
        </form>

        <div class="security-row">
          <div class="badge">🔒 SSL Secured</div>
          <div class="badge">🛡 AES-256</div>
        </div>
      </div>

      <!-- SIGNUP PANEL -->
      <div class="panel" id="panel-signup">
        <div class="card-icon">✨</div>
        <div class="card-title">Create Account</div>
        <div class="card-sub">Start predicting loan approvals instantly</div>

        <form onsubmit="handleSignup(event);">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Your full name"/>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="name@example.com"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="signup-pw" placeholder="Min. 8 characters"/>
              <button type="button" class="toggle-pw" onclick="togglePw('signup-pw', this)">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Re-enter password"/>
          </div>
          <button type="submit" class="btn-submit">Create Account →</button>
        </form>

        <div class="security-row">
          <div class="badge">🔒 SSL Secured</div>
          <div class="badge">🛡 AES-256</div>
        </div>
      </div>

    </div><!-- /auth-card -->
  </div><!-- /auth-wrapper -->
</main>

<footer>
  Luxe Capital © 2026 &nbsp;|&nbsp; AIML Summer Internship &nbsp;|&nbsp; MNNIT Allahabad
</footer>

<script>
function switchTab(mode) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='signup'));
  });
  document.getElementById('panel-login').classList.toggle('active', mode==='login');
  document.getElementById('panel-signup').classList.toggle('active', mode==='signup');
  clearAllErrors();
}

function togglePw(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text'; btn.textContent = '🙈';
  } else {
    input.type = 'password'; btn.textContent = '👁';
  }
}

function showErr(input, msg) {
  clearErr(input);
  input.style.borderBottom = '2px solid #ef4444';
  const err = document.createElement('div');
  err.className = '__err';
  err.style.cssText = 'color:#ef4444;font-size:0.78rem;margin-top:5px;';
  err.textContent = msg;
  input.parentNode.appendChild(err);
}

function clearErr(input) {
  input.style.borderBottom = '';
  const e = input.parentNode.querySelector('.__err');
  if (e) e.remove();
}

function clearAllErrors() {
  document.querySelectorAll('.__err').forEach(e => e.remove());
  document.querySelectorAll('input').forEach(i => i.style.borderBottom = '');
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.querySelector('#panel-login input[type="email"]');
  const password = document.querySelector('#panel-login input[type="password"], #panel-login #login-pw');
  let valid = true;

  clearErr(email); clearErr(password);

  if (!email.value.trim()) {
    showErr(email, '⚠ Email address required'); valid = false;
  } else if (!isValidEmail(email.value.trim())) {
    showErr(email, '⚠ Enter a valid email address'); valid = false;
  }

  if (!password.value.trim()) {
    showErr(password, '⚠ Password required'); valid = false;
  } else if (password.value.length < 6) {
    showErr(password, '⚠ Password must be at least 6 characters'); valid = false;
  }

  if (valid) window.location.href = '/predict-form';
}

function handleSignup(e) {
  e.preventDefault();
  const name     = document.querySelector('#panel-signup input[type="text"]');
  const email    = document.querySelector('#panel-signup input[type="email"]');
  const pw       = document.getElementById('signup-pw');
  const confirmPw = document.querySelector('#panel-signup input[placeholder="Re-enter password"]');
  let valid = true;

  [name, email, pw, confirmPw].forEach(clearErr);

  if (!name.value.trim()) {
    showErr(name, '⚠ Full name required'); valid = false;
  } else if (name.value.trim().length < 2) {
    showErr(name, '⚠ Enter your full name'); valid = false;
  }

  if (!email.value.trim()) {
    showErr(email, '⚠ Email address required'); valid = false;
  } else if (!isValidEmail(email.value.trim())) {
    showErr(email, '⚠ Enter a valid email address'); valid = false;
  }

  if (!pw.value.trim()) {
    showErr(pw, '⚠ Password required'); valid = false;
  } else if (pw.value.length < 8) {
    showErr(pw, '⚠ Password must be at least 8 characters'); valid = false;
  }

  if (!confirmPw.value.trim()) {
    showErr(confirmPw, '⚠ Please confirm your password'); valid = false;
  } else if (pw.value !== confirmPw.value) {
    showErr(confirmPw, '⚠ Passwords do not match'); valid = false;
  }

  if (valid) window.location.href = '/predict-form';
}
</script>
</body>
</html>
